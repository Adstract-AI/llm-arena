services:
  db:
    image: postgres:16-alpine
    env_file:
      - ./llm-arena-backend/.env
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-llm_arena} -d ${POSTGRES_DB:-llm_arena}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./llm-arena-backend
      dockerfile: Dockerfile.deployment
    env_file:
      - ./llm-arena-backend/.env
    environment:
      AUTO_START_SETUP: ${AUTO_START_SETUP}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./llm-arena-frontend
      dockerfile: Dockerfile.deployment
    env_file:
      - ./llm-arena-frontend/.env
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      # Enable this when TLS certificates and a 443 server block are added.
      # - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started

volumes:
  postgres_data:
