services:
  db:
    image: postgres:16-alpine
    env_file:
      - ./llm-arena-backend/.env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-llm_arena} -d ${POSTGRES_DB:-llm_arena}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./llm-arena-backend
      dockerfile: Dockerfile.deployment
    env_file:
      - ./llm-arena-backend/.env
    environment:
      AUTO_START_SETUP: ${AUTO_START_SETUP}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      PORT: ${BACKEND_PORT}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./llm-arena-frontend
      dockerfile: Dockerfile.deployment
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
