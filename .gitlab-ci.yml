stages:
  - build
  - deploy

variables:
  GIT_SUBMODULE_STRATEGY: recursive
  DOCKERHUB_NAMESPACE: itonkdong
  BACKEND_IMAGE: "$DOCKERHUB_NAMESPACE/llm-arena-backend"
  FRONTEND_IMAGE: "$DOCKERHUB_NAMESPACE/llm-arena-frontend"
  VM_SSH_PORT: "22"

.kaniko_build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    - mkdir -p /kaniko/.docker
    - |
      if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
        printf '{"auths":{"https://index.docker.io/v1/":{"username":"%s","password":"%s"}}}' "$DOCKERHUB_USERNAME" "$DOCKERHUB_TOKEN" > /kaniko/.docker/config.json
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'

build_backend:
  extends: .kaniko_build
  script:
    - |
      /kaniko/executor \
        --context "$CI_PROJECT_DIR/llm-arena-backend" \
        --dockerfile "$CI_PROJECT_DIR/llm-arena-backend/Dockerfile.deployment" \
        --destination "$BACKEND_IMAGE:latest" \
        --destination "$BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA" \
        --destination "$BACKEND_IMAGE:mr-$CI_MERGE_REQUEST_IID"

build_frontend:
  extends: .kaniko_build
  script:
    - |
      /kaniko/executor \
        --context "$CI_PROJECT_DIR/llm-arena-frontend" \
        --dockerfile "$CI_PROJECT_DIR/llm-arena-frontend/Dockerfile.deployment" \
        --destination "$FRONTEND_IMAGE:latest" \
        --destination "$FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA" \
        --destination "$FRONTEND_IMAGE:mr-$CI_MERGE_REQUEST_IID"

deploy_vm:
  stage: deploy
  image: alpine:3.20
  needs:
    - build_backend
    - build_frontend
  before_script:
    - apk add --no-cache coreutils expect openssh-client
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - |
      if [ -f "$VM_SSH_PRIVATE_KEY" ]; then
        cp "$VM_SSH_PRIVATE_KEY" ~/.ssh/id_ed25519
      else
        printf '%s\n' "$VM_SSH_PRIVATE_KEY" | sed 's/\\n/\n/g' | tr -d '\r' > ~/.ssh/id_ed25519
      fi
    - chmod 600 ~/.ssh/id_ed25519
    - eval "$(ssh-agent -s)"
    - |
      if [ -n "$VM_SSH_KEY_PASSPHRASE" ]; then
        timeout 30s expect -c '
          set timeout 25
          spawn ssh-add $env(HOME)/.ssh/id_ed25519
          expect {
            -re "Enter passphrase.*:" {
              send -- "$env(VM_SSH_KEY_PASSPHRASE)\r"
              exp_continue
            }
            -re "Identity added" { exit 0 }
            eof {
              catch wait result
              exit [lindex $result 3]
            }
            timeout { exit 124 }
          }
        '
      else
        timeout 30s ssh-add ~/.ssh/id_ed25519;
      fi
    - ssh-keyscan -p "$VM_SSH_PORT" "$VM_HOST" >> ~/.ssh/known_hosts
  script:
    - >
      ssh -p "$VM_SSH_PORT" "$VM_USER@$VM_HOST"
      "cd '$VM_DEPLOY_PATH' &&
      docker compose pull backend frontend &&
      docker compose up -d --remove-orphans &&
      docker image prune -f"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
