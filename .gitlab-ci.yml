stages:
  - build
  - deploy

variables:
  GIT_SUBMODULE_STRATEGY: recursive
  DOCKERHUB_NAMESPACE: itonkdong
  BACKEND_IMAGE: "$DOCKERHUB_NAMESPACE/llm-arena-backend"
  FRONTEND_IMAGE: "$DOCKERHUB_NAMESPACE/llm-arena-frontend"
  VM_SSH_PORT: "22"

.kaniko_build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    - mkdir -p /kaniko/.docker
    - |
      if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
        printf '{"auths":{"https://index.docker.io/v1/":{"username":"%s","password":"%s"}}}' "$DOCKERHUB_USERNAME" "$DOCKERHUB_TOKEN" > /kaniko/.docker/config.json
      fi
  rules:
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    - if: '$CI_COMMIT_BRANCH == "main"'

build_backend:
  extends: .kaniko_build
  script:
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        /kaniko/executor \
          --context "$CI_PROJECT_DIR/llm-arena-backend" \
          --dockerfile "$CI_PROJECT_DIR/llm-arena-backend/Dockerfile.deployment" \
          --destination "$BACKEND_IMAGE:latest" \
          --destination "$BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA"
      else
        /kaniko/executor \
          --context "$CI_PROJECT_DIR/llm-arena-backend" \
          --dockerfile "$CI_PROJECT_DIR/llm-arena-backend/Dockerfile.deployment" \
          --no-push
      fi

build_frontend:
  extends: .kaniko_build
  script:
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        /kaniko/executor \
          --context "$CI_PROJECT_DIR/llm-arena-frontend" \
          --dockerfile "$CI_PROJECT_DIR/llm-arena-frontend/Dockerfile.deployment" \
          --destination "$FRONTEND_IMAGE:latest" \
          --destination "$FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA"
      else
        /kaniko/executor \
          --context "$CI_PROJECT_DIR/llm-arena-frontend" \
          --dockerfile "$CI_PROJECT_DIR/llm-arena-frontend/Dockerfile.deployment" \
          --no-push
      fi

deploy_vm:
  stage: deploy
  image: alpine:3.20
  needs:
    - build_backend
    - build_frontend
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - printf '%s\n' "$VM_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - eval "$(ssh-agent -s)"
    - >
      if [ -n "$VM_SSH_KEY_PASSPHRASE" ]; then
        printf '#!/bin/sh\nprintf "%%s\\n" "$VM_SSH_KEY_PASSPHRASE"\n' > ~/.ssh/askpass.sh;
        chmod 700 ~/.ssh/askpass.sh;
        DISPLAY=:0 SSH_ASKPASS="$HOME/.ssh/askpass.sh" SSH_ASKPASS_REQUIRE=force ssh-add ~/.ssh/id_ed25519 < /dev/null;
      else
        ssh-add ~/.ssh/id_ed25519;
      fi
    - ssh-keyscan -p "$VM_SSH_PORT" "$VM_HOST" >> ~/.ssh/known_hosts
  script:
    - >
      ssh -p "$VM_SSH_PORT" "$VM_USER@$VM_HOST"
      "cd '$VM_DEPLOY_PATH' &&
      docker compose pull backend frontend &&
      docker compose up -d --remove-orphans &&
      docker image prune -f"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
